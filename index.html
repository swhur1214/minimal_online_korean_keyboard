<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korean Keyboard</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="wrap">
        <header>
            <span class="title">Minimal Online Korean Keyboard</span>
        </header>

        <textarea id="output" lang="ko" rows="16" placeholder="입력…" autocomplete="off" autocorrect="off"
            autocapitalize="off" spellcheck="false"></textarea>

        <div class="footer">
            <div class="controls">
                <button id="fontDown" class="font-btn" type="button" title="Decrease font size">A−</button>
                <button id="fontUp" class="font-btn" type="button" title="Increase font size">A+</button>
                <button id="kbToggle" class="font-btn" type="button" title="Show/hide keyboard">⌨</button>
            </div>
            <div class="toggle-group">
                <span class="hint">Ctrl/Cmd+Space to toggle</span>
                <button id="modeBadge" class="mode-badge" type="button"
                    title="Click or press Ctrl/Cmd+Space to switch">KR</button>
            </div>
        </div>

        <div id="keyboard" class="keyboard"></div>
    </div>

    <script src="app.js"></script>
</body>

</html>
